<!DOCTYPE html>
<html>
<head>
  <title>Mini Game 🎮</title>
  <style>
    body{
      background:black;
      color:white;
      text-align:center;
      font-family:Arial;
    }
    h1{
      margin-top:50px;
    }
    #btn{
      margin-top:30px;
      padding:20px;
      font-size:20px;
      border:none;
      border-radius:15px;
      background:gold;
      color:black;
    }
  </style>
</head>
<body>

<h1>💰 Coin Game</h1>
<p>Score: <span id="score">0</span></p>

<button id="btn" onclick="addCoin()">💸 Bos!</button>

<script>
let score = 0;

function addCoin(){
  score++;
  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
