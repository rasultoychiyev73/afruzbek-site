<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afruzbek Hub</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b0b0f, #151524);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 380px;
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 28px 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    p {
      margin: 0 0 22px;
      color: #d7d7d7;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      color: white;
      background: #6c3bff;
      cursor: pointer;
    }

    .btn.play {
      background: #ff2d55;
    }

    .btn.tg {
      background: #229ED9;
    }

    .btn.ig {
      background: #d62976;
    }

    .btn.tt {
      background: #111111;
      border: 1px solid #444;
    }

    .btn.yt {
      background: #ff0000;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🔥 Afruzbek Hub</h1>
    <p>O‘yin va sahifalarim</p>

    <a href="game.html">
      <button class="btn play">🎮 O‘ynash</button>
    </a>

    <a href="https://t.me/+_YLVedCyL445YWNi" target="_blank">
      <button class="btn tg">✈️ Telegram</button>
    </a>

    <a href="https://instagram.com/rzqlv_1" target="_blank">
      <button class="btn ig">📸 Instagram</button>
    </a>

    <a href="https://tiktok.com/@itz_realme" target="_blank">
      <button class="btn tt">🎵 TikTok</button>
    </a>

    <a href="https://youtube.com/@USERNAME" target="_blank">
      <button class="btn yt">▶️ YouTube</button>
    </a>
  </div>

</body>
</html>
