<!DOCTYPE html>
<html>
<head>
  <title>Hit Game 🎯</title>
  <style>
    body{
      background:black;
      color:white;
      text-align:center;
      font-family:Arial;
      overflow:hidden;
    }
    #target{
      width:80px;
      height:80px;
      background:red;
      position:absolute;
      border-radius:50%;
      cursor:pointer;
      display:none;
    }
  </style>
</head>
<body>

<h1>🎯 Target Game</h1>
<p>Time: <span id="time">10</span></p>
<p>Score: <span id="score">0</span></p>

<div id="target" onclick="hit()"></div>

<script>
let score = 0;
let timeLeft = 10;
let gameOver = false;

const target = document.getElementById("target");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");

function moveTarget() {
  if (gameOver) return;
  let x = Math.random() * (window.innerWidth - 80);
  let y = Math.random() * (window.innerHeight - 120) + 80;
  target.style.left = x + "px";
  target.style.top = y + "px";
}

function hit() {
  if (gameOver) return;
  score++;
  scoreText.innerText = score;
  moveTarget();
}

target.style.display = "block";
moveTarget();

let moveInterval = setInterval(moveTarget, 1000);

let timer = setInterval(function () {
  timeLeft--;
  timeText.innerText = timeLeft;

  if (timeLeft <= 0) {
    gameOver = true;
    clearInterval(timer);
    clearInterval(moveInterval);
    target.style.display = "none";
    alert("O‘yin tugadi! Score: " + score);
  }
}, 1000);
</script>

</body>
</html>
