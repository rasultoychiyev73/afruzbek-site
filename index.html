<!DOCTYPE html>
<html>
<head>
  <title>Speed Game ⚡</title>
  <style>
    body{
      background:black;
      color:white;
      text-align:center;
      font-family:Arial;
    }
    h1{
      margin-top:30px;
    }
    #btn{
      margin-top:20px;
      padding:20px;
      font-size:22px;
      border:none;
      border-radius:15px;
      background:red;
      color:white;
    }
  </style>
</head>
<body>

<h1>⚡ Speed Click Game</h1>

<p>Time: <span id="time">10</span>s</p>
<p>Score: <span id="score">0</span></p>
<p>Record: <span id="record">0</span></p>

<button id="btn" onclick="clickGame()">BOS TEZ! 🔥</button>

<script>
let score = 0;
let time = 10;
let record = 0;
let playing = true;

let timer = setInterval(function(){
  if(time > 0){
    time--;
    document.getElementById("time").innerText = time;
  } else {
    playing = false;
    if(score > record){
      record = score;
      document.getElementById("record").innerText = record;
    }
    alert("Game tugadi! Score: " + score);
  }
}, 1000);

function clickGame(){
  if(playing){
    score++;
    document.getElementById("score").innerText = score;
  }
}
</script>

</body>
</html>
