<!DOCTYPE html>
<html>
<head>
  <title>Hit Game 🎯</title>
  <style>
    body{
      background:black;
      color:white;
      text-align:center;
      font-family:Arial;
      overflow:hidden;
    }
    #target{
      width:80px;
      height:80px;
      background:red;
      position:absolute;
      border-radius:50%;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>🎯 Target Game</h1>
<p>Score: <span id="score">0</span></p>

<div id="target" onclick="hit()"></div>

<script>
let score = 0;
let target = document.getElementById("target");

function moveTarget(){
  let x = Math.random() * (window.innerWidth - 80);
  let y = Math.random() * (window.innerHeight - 80);
  target.style.left = x + "px";
  target.style.top = y + "px";
}

function hit(){
  score++;
  document.getElementById("score").innerText = score;
  moveTarget();
}

setInterval(moveTarget, 1000);
</script>

</body>
</html>
